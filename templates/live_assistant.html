<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraBot Pro | Real-time Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fdfdfd; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .pulse-ring { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.2; } 100% { transform: scale(1); opacity: 0.5; } }
        .wave-bar { transition: height 0.1s ease; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-green-50 via-white to-emerald-50">

    <div class="max-w-4xl w-full h-[80vh] glass-card rounded-[40px] shadow-2xl overflow-hidden flex flex-col relative">
        <!-- Floating Header -->
        <div class="p-8 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary font-bold text-2xl">eco</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 tracking-tight">TerraBot <span class="text-primary">PRO</span></h1>
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-widest">Real-time Multimodal Live</p>
                </div>
            </div>
            <a href="/dashboard" class="px-6 py-2 rounded-full bg-white/50 border border-gray-100 text-sm font-semibold text-gray-600 hover:bg-white transition-all">Exit</a>
        </div>

        <!-- Main Visualizer Area -->
        <div class="flex-1 flex flex-col items-center justify-center space-y-12">
            
            <!-- Dynamic AI Sphere -->
            <div id="aiSphere" class="relative w-64 h-64 flex items-center justify-center">
                <div class="absolute inset-0 bg-primary/5 rounded-full pulse-ring"></div>
                <div class="absolute inset-4 bg-primary/10 rounded-full"></div>
                <div class="w-48 h-48 bg-white rounded-full shadow-[0_20px_50px_rgba(34,197,94,0.3)] flex items-center justify-center overflow-hidden border-4 border-white">
                    <!-- Audio Wave Visualizer Bars -->
                    <div id="visualizer" class="flex items-end gap-1 h-24">
                        <!-- Bars generated via JS -->
                    </div>
                </div>
            </div>

            <!-- Language Selector -->
            <div class="flex gap-4">
                <select id="langSelect" class="px-6 py-3 rounded-2xl bg-white border border-gray-100 shadow-sm text-sm font-medium focus:ring-2 focus:ring-primary outline-none transition-all">
                    <option value="English">English Assistant</option>
                    <option value="Hindi">हिन्दी सहायक</option>
                    <option value="Nepali">नेपाली सहायक</option>
                    <option value="Telugu">తెలుగు సహాయకుడు</option>
                </select>
                <button id="startBtn" class="px-8 py-3 bg-primary text-white rounded-2xl font-bold shadow-lg shadow-primary/30 hover:scale-105 transition-all">Connect Brain</button>
            </div>

            <!-- Status Indicator -->
            <div id="status" class="text-sm font-medium text-gray-400">Press Start to Begin Real-time Conversation</div>
        </div>

        <!-- Footer Transcription Light -->
        <div class="p-8 border-t border-gray-100 bg-white/30 backdrop-blur-md">
            <p id="transcript" class="text-center text-gray-500 italic max-w-lg mx-auto leading-relaxed">System ready. No speech protocol active.</p>
        </div>
    </div>

    <script>
        const socket = io('/live');
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const langSelect = document.getElementById('langSelect');
        const visualizer = document.getElementById('visualizer');

        // Create Visualizer Bars
        for(let i=0; i<8; i++) {
            const bar = document.createElement('div');
            bar.className = 'w-2 bg-primary rounded-full wave-bar';
            bar.style.height = '10px';
            visualizer.appendChild(bar);
        }

        let audioContext;
        let processor;
        let isSessionActive = false;

        startBtn.onclick = async () => {
            if (isSessionActive) {
                location.reload(); // Quick reset
                return;
            }

            try {
                // Initialize Audio
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                
                // ScriptProcessor for 512 samples (High speed)
                processor = audioContext.createScriptProcessor(512, 1, 1);
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (!isSessionActive) return;
                    const input = e.inputBuffer.getChannelData(0);
                    // Convert Float32 to Int16
                    const pcm = new Int16Array(input.length);
                    for (let i = 0; i < input.length; i++) {
                        pcm[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
                    }
                    // Send RAW BINARY to Server
                    socket.emit('audio_in', pcm.buffer);
                };

                // Start Session
                socket.emit('start_session', { language: langSelect.value });
                isSessionActive = true;
                startBtn.innerText = "Stop Session";
                startBtn.classList.replace('bg-primary', 'bg-red-500');
                statusEl.innerText = "Listening... Speaks whenever you want.";
                transcriptEl.innerText = "I am listening. Talk to me naturally!";

            } catch (err) {
                console.error(err);
                alert("Microphone access is required for TerraBot Pro.");
            }
        };

        // Handle RAW BINARY AI Audio Output
        socket.on('audio_out', (data) => {
            // data is now a raw binary ArrayBuffer
            const pcm = new Int16Array(data);
            
            // Play PCM using AudioContext
            const buffer = audioContext.createBuffer(1, pcm.length, 16000);
            const channelData = buffer.getChannelData(0);
            for (let i = 0; i < pcm.length; i++) channelData[i] = pcm[i] / 0x7FFF;

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();

            // Animate Visualizer
            const bars = document.querySelectorAll('.wave-bar');
            bars.forEach(b => b.style.height = (Math.random() * 50 + 20) + 'px');
            setTimeout(() => bars.forEach(b => b.style.height = '10px'), 100);
        });

        socket.on('error', (data) => {
            alert("Live Error: " + data.msg);
        });
    </script>
</body>
</html>
